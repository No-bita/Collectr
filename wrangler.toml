name = "lekho-edge"
compatibility_date = "2026-05-24"
main = "src/index.js"

[vars]
# Add public environment variables here
ENVIRONMENT = "production"
FRONTEND_URL = "https://lekho-edge.collectr.workers.dev"
WHATSAPP_NEW_LEAD_TEMPLATE = "onboarding_first_message"
WHATSAPP_TEMPLATE_LANG = "en"
FIRM_NAME = "Mishra & Associates"

[[d1_databases]]
binding = "DB"
database_name = "lekho-db"
database_id = "d2bb5eeb-85ea-4f2d-842a-4d04570d0c21"

# Gemini API Key (Will be set via secrets)
# GEMINI_API_KEY = ""

[[r2_buckets]]
binding = "DOCUMENT_BUCKET"
bucket_name = "lekho-documents"
preview_bucket_name = "lekho-documents-preview"

[assets]
directory = "./frontend"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
