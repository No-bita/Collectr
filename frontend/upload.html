<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Secure Upload Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  
  <style>
    :root {
      /* Vibrant Light Mode Palette */
      --glass-bg: rgba(255, 255, 255, 0.6);
      --glass-border: rgba(255, 255, 255, 0.4);
      --glass-shadow: 0 8px 32px rgba(31, 38, 135, 0.08);
      
      --mesh-1: oklch(85% 0.1 250); /* Soft blue */
      --mesh-2: oklch(90% 0.12 320); /* Soft pink */
      --mesh-3: oklch(88% 0.1 180); /* Soft cyan */
      
      --text-main: oklch(30% 0.02 250);
      --text-muted: oklch(55% 0.02 250);
      
      --btn-grad-start: oklch(65% 0.2 260); /* Vibrant Blue */
      --btn-grad-end: oklch(65% 0.2 300); /* Vibrant Purple */
      
      --success-bg: rgba(220, 252, 231, 0.8);
      --success-text: #166534;
      
      --radius-lg: 24px;
      --radius-md: 16px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text-main);
      background-color: var(--mesh-1);
      
      /* Animated Mesh Gradient */
      background-image: 
        radial-gradient(at 0% 0%, var(--mesh-2) 0px, transparent 50%),
        radial-gradient(at 100% 0%, var(--mesh-3) 0px, transparent 50%),
        radial-gradient(at 100% 100%, var(--mesh-2) 0px, transparent 50%),
        radial-gradient(at 0% 100%, var(--mesh-1) 0px, transparent 50%);
      background-size: 200% 200%;
      animation: meshAnim 15s ease infinite alternate;
    }

    @keyframes meshAnim {
      0% { background-position: 0% 0%; }
      100% { background-position: 100% 100%; }
    }

    /* Glassmorphism Container */
    .upload-container {
      width: 100%;
      max-width: 540px;
      background: var(--glass-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: var(--radius-lg);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .upload-header {
      padding: 2.5rem 2rem 1.5rem;
      text-align: center;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }

    .upload-header h1 {
      margin: 0 0 0.5rem;
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .upload-header p {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.95rem;
      font-weight: 500;
    }

    .badge-done {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.35rem 0.8rem;
      background: rgba(0,0,0,0.04);
      color: var(--text-muted);
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.5);
    }

    .doc-list {
      padding: 1.5rem 2rem 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .doc-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 1.5rem;
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: var(--radius-md);
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      /* Use allow-discrete for structural transitions if needed */
      transition-behavior: allow-discrete;
    }

    .doc-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(0,0,0,0.04);
      background: rgba(255,255,255,0.9);
    }

    .doc-item.done {
      background: var(--success-bg);
      border-color: rgba(255,255,255,0.6);
      transform: translateY(0);
      box-shadow: none;
    }

    .doc-item-info h3 {
      margin: 0 0 0.25rem;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .doc-item-info p {
      margin: 0;
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: capitalize;
    }

    .done .doc-item-info p {
      color: var(--success-text);
    }

    .file-input-wrapper {
      position: relative;
      display: inline-block;
    }

    .file-input-wrapper input[type=file] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      z-index: 2;
      width: 100%;
    }

    .btn-primary {
      position: relative;
      z-index: 1;
      background: linear-gradient(135deg, var(--btn-grad-start), var(--btn-grad-end));
      color: white;
      border: none;
      padding: 0.6rem 1.25rem;
      border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
      transition: all 0.2s ease;
    }

    .file-input-wrapper:hover .btn-primary {
      filter: brightness(1.1);
      box-shadow: 0 6px 16px rgba(37, 99, 235, 0.35);
      transform: scale(1.02);
    }
    
    .file-input-wrapper:active .btn-primary {
      transform: scale(0.98);
    }

    .btn-primary:disabled {
      opacity: 0.7;
      pointer-events: none;
      animation: pulse 1.5s infinite alternate;
    }

    @keyframes pulse {
      from { opacity: 0.7; }
      to { opacity: 0.4; }
    }

    .success-text {
      color: var(--success-text);
      font-weight: 700;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      animation: popIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }
    
    .error-msg {
      text-align: center;
      color: #dc2626;
      font-weight: 500;
      padding: 1rem;
      background: rgba(254, 226, 226, 0.7);
      border-radius: var(--radius-sm);
      margin-top: 1rem;
    }

  </style>
</head>
<body>

<div class="upload-container" id="app">
  <div class="upload-header">
    <h1>Secure Document Portal</h1>
    <p id="phone-display">Verifying secure link...</p>
    <div><span class="badge badge-done">End-to-End Encrypted</span></div>
  </div>
  <div class="doc-list" id="doc-list">
    <!-- Docs injected here -->
  </div>
</div>

<script>
  // Get token from URL e.g. /upload.html?t=abc
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('t') || window.location.pathname.split('/').pop();

  const appEl = document.getElementById('app');
  const docListEl = document.getElementById('doc-list');
  const phoneDisplayEl = document.getElementById('phone-display');


  async function fetchSession() {
    try {
      const res = await fetch(`/api/session/${token}`);
      if (!res.ok) throw new Error("Invalid or expired session");
      const session = await res.json();
      phoneDisplayEl.textContent = `Verified for: ${session.phoneMasked}`;
      renderDocs(session.documents);
    } catch (err) {
      phoneDisplayEl.textContent = "Access Denied";
      phoneDisplayEl.style.color = "#dc2626";
      docListEl.innerHTML = `<div class="error-msg">${err.message}</div>`;
    }
  }

  function renderDocs(documents) {
    docListEl.innerHTML = '';
    documents.forEach((doc, index) => {
      const isDone = doc.status === 'received';
      const div = document.createElement('div');
      div.className = `doc-item ${isDone ? 'done' : ''}`;
      // Staggered animation for initial load
      div.style.animation = `slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) ${0.1 + (index * 0.05)}s both`;
      
      let actionHtml = '';
      if (isDone) {
        actionHtml = `<span class="success-text">✓ Received</span>`;
      } else {
        actionHtml = `
          <div class="file-input-wrapper">
            <button class="btn-primary" id="btn-${doc.id}">Select File</button>
            <input type="file" accept="image/*,application/pdf" onchange="handleUpload('${doc.id}', this)" />
          </div>
        `;
      }

      div.innerHTML = `
        <div class="doc-item-info">
          <h3>${doc.type.replace(/_/g, ' ').toUpperCase()}</h3>
          <p>${doc.status}</p>
        </div>
        <div>${actionHtml}</div>
      `;
      docListEl.appendChild(div);
    });
  }

  async function handleUpload(docId, inputEl) {
    const file = inputEl.files[0];
    if (!file) return;

    const btn = document.getElementById(`btn-${docId}`);
    btn.textContent = "Uploading...";
    inputEl.disabled = true;

    try {
      // 1. Get Presigned URL
      const res = await fetch(`/api/upload-url/${token}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          documentId: docId,
          contentType: file.type
        })
      });
      if (!res.ok) throw new Error("Failed to get upload slot");
      const { uploadUrl } = await res.json();

      // 2. Upload to R2
      const putRes = await fetch(uploadUrl, {
        method: 'PUT',
        headers: { 'Content-Type': file.type },
        body: file
      });
      if (!putRes.ok) throw new Error("Upload failed");

      // 3. Notify Backend
      const notifyRes = await fetch(`/api/upload-complete/${token}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ documentId: docId })
      });

      fetchSession();
    } catch (err) {
      alert(err.message);
      btn.textContent = "Select File";
      inputEl.disabled = false;
    }
  }

  if (token) {
    fetchSession();
  } else {
    phoneDisplayEl.textContent = "Access Denied";
    docListEl.innerHTML = `<div class="error-msg">Invalid link structure.</div>`;
  }
</script>

</body>
</html>
